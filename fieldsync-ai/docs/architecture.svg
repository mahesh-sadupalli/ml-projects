<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#172554"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="psGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="sqliteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="supaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">FIELDSYNC AI — ARCHITECTURE</text>

  <!-- Browser Container -->
  <rect x="40" y="55" width="820" height="310" rx="12" fill="url(#browserGrad)" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="80" fill="#94a3b8" font-size="13" font-weight="600" letter-spacing="1.5">BROWSER (OFFLINE-CAPABLE)</text>

  <!-- React UI Box -->
  <rect x="70" y="95" width="220" height="110" rx="10" fill="url(#reactGrad)" filter="url(#shadow)"/>
  <text x="180" y="138" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">React UI</text>
  <text x="180" y="158" text-anchor="middle" fill="#e0f2fe" font-size="11">TypeScript + Router</text>
  <text x="180" y="175" text-anchor="middle" fill="#bae6fd" font-size="10">Dashboard | Entries | Insights</text>

  <!-- AI Engine Box -->
  <rect x="340" y="95" width="220" height="110" rx="10" fill="url(#aiGrad)" filter="url(#shadow)"/>
  <text x="450" y="132" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">AI Engine</text>
  <text x="450" y="152" text-anchor="middle" fill="#f3e8ff" font-size="11">On-Device Analysis</text>
  <text x="450" y="169" text-anchor="middle" fill="#e9d5ff" font-size="10">Categorization | Sentiment</text>
  <text x="450" y="183" text-anchor="middle" fill="#e9d5ff" font-size="10">Priority | Tags | Summary</text>

  <!-- PowerSync SDK Box -->
  <rect x="610" y="95" width="220" height="110" rx="10" fill="url(#psGrad)" filter="url(#shadow)"/>
  <text x="720" y="138" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">PowerSync SDK</text>
  <text x="720" y="158" text-anchor="middle" fill="#fef3c7" font-size="11">Web SDK + WASM</text>
  <text x="720" y="175" text-anchor="middle" fill="#fde68a" font-size="10">Sync Engine | CRUD Queue</text>

  <!-- Connecting lines to SQLite -->
  <line x1="180" y1="205" x2="180" y2="250" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="205" x2="450" y2="250" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="720" y1="205" x2="720" y2="250" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow heads -->
  <polygon points="180,250 176,242 184,242" fill="#64748b"/>
  <polygon points="450,250 446,242 454,242" fill="#64748b"/>
  <polygon points="720,250 716,242 724,242" fill="#64748b"/>

  <!-- SQLite WASM Box -->
  <rect x="250" y="255" width="400" height="80" rx="10" fill="url(#sqliteGrad)" filter="url(#shadow)"/>
  <text x="450" y="287" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">SQLite (WASM)</text>
  <text x="450" y="310" text-anchor="middle" fill="#d1fae5" font-size="12">Local-First Database — Works 100% Offline</text>
  <text x="450" y="325" text-anchor="middle" fill="#a7f3d0" font-size="10">entries | projects | ai_insights</text>

  <!-- Sync arrow down -->
  <line x1="450" y1="365" x2="450" y2="405" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="450,405 444,395 456,395" fill="#f59e0b"/>
  <!-- Sync arrow up -->
  <line x1="465" y1="405" x2="465" y2="365" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="465,365 459,375 471,375" fill="#f59e0b"/>

  <!-- Sync label -->
  <rect x="480" y="374" width="160" height="22" rx="4" fill="#422006"/>
  <text x="560" y="389" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600" filter="url(#glow)">Sync Streams (auto)</text>

  <!-- PowerSync Cloud Box -->
  <rect x="300" y="410" width="300" height="70" rx="10" fill="url(#cloudGrad)" filter="url(#shadow)"/>
  <text x="450" y="440" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">PowerSync Cloud</text>
  <text x="450" y="460" text-anchor="middle" fill="#fed7aa" font-size="11">Bucket Definitions | Per-User Sync</text>

  <!-- Arrow to Supabase -->
  <line x1="450" y1="480" x2="450" y2="520" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="450,520 444,510 456,510" fill="#22c55e"/>
  <line x1="465" y1="520" x2="465" y2="480" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="465,480 459,490 471,490" fill="#22c55e"/>

  <!-- Replication label -->
  <rect x="480" y="489" width="140" height="22" rx="4" fill="#052e16"/>
  <text x="550" y="504" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">Replication</text>

  <!-- Supabase Box -->
  <rect x="250" y="525" width="400" height="75" rx="10" fill="url(#supaGrad)" filter="url(#shadow)"/>
  <text x="450" y="555" text-anchor="middle" fill="#fff" font-size="17" font-weight="700">Supabase</text>
  <text x="450" y="575" text-anchor="middle" fill="#dcfce7" font-size="11">Postgres + Auth (JWT) + Row-Level Security</text>
  <text x="450" y="591" text-anchor="middle" fill="#bbf7d0" font-size="10">Email/Password Auth | Per-User Data Isolation</text>

  <!-- Legend dots -->
  <circle cx="60" y="420" r="5" fill="#0ea5e9"/>
  <text x="72" y="424" fill="#94a3b8" font-size="10">Frontend</text>
  <circle cx="60" y="440" r="5" fill="#a855f7"/>
  <text x="72" y="444" fill="#94a3b8" font-size="10">AI (On-Device)</text>
  <circle cx="60" y="460" r="5" fill="#f59e0b"/>
  <text x="72" y="464" fill="#94a3b8" font-size="10">PowerSync</text>
  <circle cx="60" y="480" r="5" fill="#10b981"/>
  <text x="72" y="484" fill="#94a3b8" font-size="10">Local DB</text>
  <circle cx="60" y="500" r="5" fill="#22c55e"/>
  <text x="72" y="504" fill="#94a3b8" font-size="10">Supabase</text>
</svg>
